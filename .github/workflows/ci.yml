name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  health-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Health scan (placeholders, dummy text, broken links, stray emails)
        run: python3 scripts/health_scan.py
